kind = "web"
previewPath = "/"
title = "Connexted"
version = "1.0.0"
id = "artifacts/connexted"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20087

[services.development]
run = "pnpm --filter @workspace/connexted run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/connexted", "run", "build" ]
publicDir = "artifacts/connexted/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20087"
BASE_PATH = "/"
